basePath: /
definitions:
  internal_transport_http.RegisterRequest:
    properties:
      email:
        type: string
      name:
        type: string
      password:
        type: string
    type: object
host: localhost:8080
info:
  contact: {}
  description: This is the Yerl (Discord clone) backend API.
  title: Yerl API
  version: "1.0"
paths:
  /api/register:
    post:
      consumes:
      - application/json
      description: Creates a new user account with email and password
      parameters:
      - description: Account Registration Data
        in: body
        name: request
        required: true
        schema:
          $ref: '#/definitions/internal_transport_http.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            type: string
        "400":
          description: Bad Request
          schema:
            type: string
        "500":
          description: Internal Server Error
          schema:
            type: string
      summary: Register an account
      tags:
      - accounts
swagger: "2.0"
