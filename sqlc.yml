version: "2"
sql:
  - engine: "sqlite"
    queries: "internal/repository/sqlite/query/"
    schema: "migrations/"
    gen:
      go:
        package: "sqlc"
        out: "internal/repository/sqlite/sqlc"
        emit_json_tags: true
        emit_prepared_queries: false
        emit_interface: false
        emit_exact_table_names: false